<!DOCTYPE html>
<html lang="ar" dir="rtl" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="ar">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="بنت السبيت">
<meta name="theme-color" content="#0d5c43">
<title>حساب بنت السبيت</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♠️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --felt:#0d5c43;
    --felt-dark:#083b2c;
    --felt-line:#0a4d39;
    --paper:#ffffff;
    --ink:#1b1b1b;
    --muted:#7a7f83;
    --line:#e6e3db;
    --red:#1565c0;        /* الفريق الأول (أزرق) */
    --red-soft:#e7f0fb;
    --spade:#e8730c;      /* الفريق الثاني (برتقالي) */
    --spade-soft:#fdeee0;
    --gold:#c9a227;
    --ok:#1e9e6a;
    --amber:#e0a11b;
    --danger:#d63a3a;
    --shadow:0 6px 20px rgba(0,0,0,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Tajawal',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 90% at 50% -10%, #12724f 0%, var(--felt) 45%, var(--felt-dark) 100%) fixed;
    height:100dvh;
    overflow:hidden;
    display:flex;flex-direction:column;align-items:center;
    padding:calc(env(safe-area-inset-top) + 5px) 9px calc(env(safe-area-inset-bottom) + 7px);
  }
  .wrap{
    width:100%;max-width:440px;flex:1;min-height:0;
    display:flex;flex-direction:column;gap:6px;overflow:hidden;
  }
  /* النصف الأعلى: اللاعبون + الإدخال (يمرّر داخلياً لو طال) */
  .top{
    flex:0 1 auto;min-height:0;overflow-y:auto;
    display:flex;flex-direction:column;gap:6px;
  }

  /* ===== Header ===== */
  header{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:2px 2px 0;color:#fff;flex-shrink:0;
  }
  .brand{display:flex;align-items:center;gap:8px;min-width:0}
  .brand-txt{min-width:0}
  .brand .suits{font-size:20px;letter-spacing:-2px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
  .brand h1{font-family:'Cairo';font-weight:900;font-size:17px;margin:0;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand .mode{font-size:10px;opacity:.8;font-weight:500;white-space:nowrap}
  .hbtns{display:flex;gap:5px;flex-shrink:0}
  .icon-btn{
    background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);
    color:#fff;border-radius:10px;padding:7px 9px;font-family:'Tajawal';font-weight:700;
    font-size:13px;cursor:pointer;transition:.15s;line-height:1;
  }
  .icon-btn.accent{background:var(--gold);border-color:var(--gold);color:#3a2e05;font-weight:800}
  .icon-btn:active{transform:scale(.94)}
  .icon-btn:hover{background:rgba(255,255,255,.22)}
  .icon-btn.accent:hover{background:#d8b02f}

  /* ===== Result banner ===== */
  #result{display:none;flex-shrink:0}
  #result.show{display:block;animation:pop .3s ease}
  @keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
  .result-card{
    background:linear-gradient(135deg,#fff 0%,#fff7e6 100%);
    border:2px solid var(--gold);border-radius:14px;padding:10px 14px;text-align:center;
    box-shadow:var(--shadow);
  }
  .result-card .crown{font-size:26px;line-height:1}
  .result-card .lose{font-family:'Cairo';font-weight:900;font-size:18px;margin:2px 0 1px;color:var(--danger)}
  .result-card .win{font-family:'Cairo';font-weight:700;font-size:14px;color:var(--ok)}
  .result-card .why{color:var(--muted);font-size:12px;margin-top:3px}

  /* ===== Notice toast ===== */
  #notice{
    position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 18px);transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:12px 18px;border-radius:14px;font-weight:700;font-size:14px;
    box-shadow:var(--shadow);max-width:90vw;text-align:center;z-index:100;
    opacity:0;pointer-events:none;transition:.25s;
  }
  #notice.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #notice.warn{background:#8a5a00}

  /* ===== Scoreboard ===== */
  .board{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
  .suit{font-size:16px;line-height:1}

  /* teams legend */
  .teams-legend{display:flex;gap:7px}
  .tchip{
    flex:1;min-width:0;display:flex;align-items:center;gap:7px;color:#fff;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:10px;padding:4px 8px;
  }
  .tchip .tc-body{min-width:0}
  .tchip .tc-name{
    display:flex;align-items:center;gap:3px;font-family:'Cairo';font-weight:800;font-size:13px;
    cursor:pointer;border-radius:6px;padding:0 3px;min-width:0;
  }
  .tchip .tc-name .tc-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .tchip .tc-name .pn-edit{font-style:normal;font-size:9px;color:var(--gold);flex-shrink:0;opacity:.85}
  .tchip .tc-name:active{background:rgba(255,255,255,.18)}
  .tchip .tc-members{font-size:10px;color:rgba(255,255,255,.68);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tchip.team0{border-inline-start:4px solid var(--red)}
  .tchip.team1{border-inline-start:4px solid #cfcfcf}
  .tchip.team0 .suit{color:#ff6b6b}
  .tchip.team1 .suit{color:#e9e9e9}

  /* player row: 1..4 by seat, right→left */
  .players-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .pcard{
    background:var(--paper);border-radius:13px;padding:7px 7px 8px;position:relative;overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.12);border-top:3px solid var(--line);min-width:0;
  }
  .pc-top{display:flex;align-items:center;gap:4px;margin-bottom:5px}
  .pc-top .suit{font-size:12px;flex-shrink:0}
  .pcard .pname{
    display:flex;align-items:center;justify-content:center;gap:3px;width:100%;cursor:pointer;
    border-radius:8px;padding:3px 4px;background:#efece3;border:1px solid #e2ddcf;
    min-height:34px;
  }
  .pcard .pname:active{background:#e4e0d3}
  .pcard .pname .pn-text{
    font-weight:800;font-size:11px;color:var(--ink);min-width:0;text-align:center;line-height:1.15;
    white-space:normal;word-break:break-word;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .pcard .pname .pn-edit{font-style:normal;font-size:10px;color:var(--gold);flex-shrink:0;opacity:.85}
  .pcard .score{
    font-family:'Cairo';font-weight:900;font-size:clamp(20px,6vw,30px);line-height:1;margin:3px 0 6px;
    letter-spacing:-1px;cursor:pointer;text-align:center;
  }
  .pcard.team0{border-top-color:var(--red)}
  .pcard.team1{border-top-color:var(--spade)}
  .pcard.team0 .score,.pcard.team0 .pc-top .suit{color:var(--red)}
  .pcard.team1 .score,.pcard.team1 .pc-top .suit{color:var(--spade)}
  .bar{height:6px;border-radius:99px;background:#eceae4;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:99px;transition:width .35s ease,background .35s}
  .pcard .dist{font-size:10px;color:var(--muted);margin-top:4px;font-weight:500;text-align:center}
  .pcard.dead{outline:2px solid var(--danger)}
  .pcard.dead::after{
    content:"خسر";position:absolute;top:5px;left:5px;background:var(--danger);color:#fff;
    font-size:9px;font-weight:800;padding:1px 5px;border-radius:99px;
  }
  /* الموزّع */
  .pcard.dealer{box-shadow:0 0 0 2px var(--gold), 0 2px 10px rgba(0,0,0,.16)}
  .pcard .deal-badge{position:absolute;top:3px;right:4px;font-size:12px;line-height:1}
  .dealer-line{
    text-align:center;color:#fff;font-family:'Cairo';font-weight:700;font-size:12px;
    background:rgba(201,162,39,.16);border:1px solid rgba(201,162,39,.4);border-radius:10px;
    padding:6px 9px;cursor:pointer;user-select:none;
  }
  .dealer-line b{color:var(--gold)}
  .dealer-line .dl-hint{font-family:'Tajawal';font-weight:500;font-size:10px;color:rgba(255,255,255,.6)}

  /* ===== Round entry ===== */
  .panel{
    background:var(--paper);border-radius:14px;padding:9px 10px;box-shadow:var(--shadow);
  }
  .entry-panel{flex-shrink:0}
  .entry-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .ri{border:1px solid var(--line);border-radius:11px;padding:6px 5px;min-width:0;text-align:center;border-top:3px solid var(--line)}
  .ri-name{font-size:10.5px;font-weight:800;color:var(--ink);display:flex;align-items:center;justify-content:center;text-align:center;margin-bottom:4px;line-height:1.12;word-break:break-word;height:26px;overflow:hidden}
  .ri.t0{border-top-color:var(--red)}
  .ri.t1{border-top-color:var(--spade)}
  .ri-input{
    width:100%;min-width:0;border:1.5px solid var(--line);border-radius:9px;padding:7px 2px;font-family:'Cairo';
    font-weight:700;font-size:17px;text-align:center;color:var(--ink);outline:none;
  }
  .ri-input:focus{border-color:var(--gold)}
  .ri-input.neg{color:var(--danger)}
  .q5{
    width:100%;margin-top:4px;border:1px solid var(--line);background:#faf9f6;border-radius:8px;padding:5px 2px;
    font-family:'Tajawal';font-weight:800;font-size:12px;color:var(--muted);cursor:pointer;transition:.12s;
  }
  .q5:active{transform:scale(.95)}
  .q5.on{background:var(--danger);color:#fff;border-color:var(--danger)}

  .sumline{
    display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px;
    padding:6px 10px;border-radius:10px;background:#f7f6f2;font-size:12px;font-weight:700;
  }
  .chip{padding:3px 10px;border-radius:99px;font-size:12px;font-weight:800;max-width:74%;white-space:normal;text-align:center;line-height:1.3}
  .chip.ok{background:#e3f6ee;color:var(--ok)}
  .chip.bad{background:#fdeaea;color:var(--danger)}
  .chip.neutral{background:#eee;color:var(--muted)}

  .actions{display:flex;gap:6px;margin-top:7px}
  .btn{
    border:none;border-radius:11px;padding:11px 9px;font-family:'Cairo';font-weight:700;font-size:15px;
    cursor:pointer;transition:.15s;
  }
  .btn:active{transform:scale(.98)}
  #recordBtn{flex:2}
  #kabootBtn{flex:1}
  #clearBtn{flex:0 0 auto;padding-left:14px;padding-right:14px}
  .btn-primary{background:var(--felt);color:#fff}
  .btn-primary:hover{background:#0e6b4e}
  .btn-ghost{background:#f2f0ea;color:var(--ink)}
  .btn-ghost:hover{background:#e9e6de}
  .btn-kaboot{background:linear-gradient(135deg,var(--gold),#a8851d);color:#fff}

  /* kaboot picker (inside modal) */
  #kabootPick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  .kb{border:2px solid var(--line);border-radius:12px;padding:14px 8px;background:#fff;cursor:pointer;
      font-family:'Cairo';font-weight:800;font-size:14px;text-align:center;line-height:1.3;
      display:flex;flex-direction:column;justify-content:center;min-height:78px}
  .kb.t0{border-color:var(--red);color:var(--red)}
  .kb.t1{border-color:var(--spade);color:var(--spade)}
  .kb small{display:block;font-family:'Tajawal';font-weight:500;font-size:10px;color:var(--muted);margin-top:5px}

  /* ===== Log (سجل الصكة) — inline, always visible ===== */
  .log-panel{flex:1 1 0;min-height:100px;display:flex;flex-direction:column;padding:8px 11px 9px}
  .log-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
  .log-head span:first-child{font-family:'Cairo';font-weight:800;font-size:13px;color:var(--ink)}
  #logCount{font-size:11px;color:var(--muted);font-weight:600}
  .log-grid{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
  .log-row{
    display:grid;grid-template-columns:26px repeat(4,1fr);gap:5px;align-items:center;
    padding:5px 4px;border-radius:8px;
  }
  .log-hrow{position:sticky;top:0;background:var(--paper);padding-top:0;padding-bottom:6px;
            border-bottom:1px solid var(--line);border-radius:0;z-index:1}
  .log-row:not(.log-hrow):nth-child(odd){background:#f7f6f2}
  .log-row.kaboot{background:#fdf6e3}
  .log-row.adjust{background:#eef4ff}
  .lc-num{
    width:22px;height:22px;justify-self:center;border-radius:99px;background:var(--felt);color:#fff;
    font-weight:800;font-size:10px;display:flex;align-items:center;justify-content:center;
  }
  .log-hrow .lc-num{background:transparent;color:var(--muted)}
  .log-row.kaboot .lc-num{background:var(--gold)}
  .log-row.adjust .lc-num{background:#3b6fd6}
  .lc{text-align:center;font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.05;min-width:0}
  .lc b{font-weight:800;font-size:14px}
  .lc em{font-style:normal;font-weight:700;font-size:10px;color:var(--muted);margin-top:1px}
  .log-hrow .lc{font-family:'Tajawal';font-weight:700;font-size:11px}
  .lc.t0,.lc.ht0{color:var(--red)}
  .lc.t1,.lc.ht1{color:var(--spade)}
  .log-empty{color:var(--muted);font-size:12px;text-align:center;padding:16px 8px}
  /* ===== Mode modal ===== */
  .modal{
    display:none;position:fixed;inset:0;z-index:90;
    background:rgba(6,30,22,.6);backdrop-filter:blur(3px);
    align-items:center;justify-content:center;padding:20px;
  }
  .modal.show{display:flex;animation:pop .2s ease}
  .modal-card{
    background:var(--paper);border-radius:20px;padding:20px;width:100%;max-width:360px;box-shadow:var(--shadow);
  }
  .modal-card h3{font-family:'Cairo';font-weight:900;font-size:19px;margin:0 0 2px}
  .modal-card p{color:var(--muted);font-size:13px;margin:0 0 14px}
  .mode-opt{
    display:block;width:100%;text-align:right;border:2px solid var(--line);background:#fff;
    border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.15s;
  }
  .mode-opt:hover{border-color:var(--felt);background:#f4fbf8}
  .mode-opt.tight:hover{border-color:var(--gold);background:#fdf9ec}
  .mode-opt:active{transform:scale(.98)}
  .mo-title{display:block;font-family:'Cairo';font-weight:800;font-size:17px;color:var(--ink)}
  .mo-sub{display:block;color:var(--muted);font-size:12px;margin-top:3px}
  .mode-cancel{
    width:100%;border:none;background:#f2f0ea;color:var(--muted);border-radius:12px;
    padding:12px;font-family:'Tajawal';font-weight:700;font-size:14px;cursor:pointer;margin-top:2px;
  }
  .modal-tall{max-width:400px}
  .nm-list{display:flex;flex-direction:column;gap:6px;max-height:52vh;overflow-y:auto;margin-bottom:12px}
  .nm-item{
    width:100%;text-align:center;border:1.5px solid var(--line);background:#fff;border-radius:12px;
    padding:12px 14px;font-family:'Tajawal';font-weight:700;font-size:16px;color:var(--ink);cursor:pointer;transition:.1s;
  }
  .nm-item:active{background:#f2f0ea;transform:scale(.99)}
  .nm-item.current{border-color:var(--gold);background:#fdf9ec}
  .nm-item.other{border-style:dashed;color:var(--felt);font-weight:800}
  .nm-field{
    width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 12px;font-family:'Tajawal';
    font-weight:700;font-size:17px;color:var(--ink);outline:none;margin-bottom:12px;background:#fff;
  }
  .nm-field:focus{border-color:var(--gold)}
  .info-text{color:var(--ink)!important;font-size:14px!important;line-height:1.9;margin:0 0 14px!important}
  .info-text b{color:var(--felt)}

  @media(max-height:660px){
    .pcard .score{font-size:clamp(20px,6.5vw,28px)}
    .board{gap:6px}
    .wrap{gap:6px}
  }
  /* ===== Home screen ===== */
  .home{
    position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:22px;
    background:radial-gradient(120% 90% at 50% -10%, #12724f 0%, var(--felt) 45%, var(--felt-dark) 100%);
  }
  .home.show{display:flex}
  .home-card{width:100%;max-width:380px;text-align:center;color:#fff}
  .home-logo{font-size:42px;letter-spacing:-6px}
  .home-title{font-family:'Cairo';font-weight:900;font-size:30px;margin:8px 0 2px}
  .home-sub{color:rgba(255,255,255,.8);font-size:13px;margin:0 0 24px}
  .home-btn{
    width:100%;border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:15px;
    font-family:'Cairo';font-weight:800;font-size:17px;cursor:pointer;margin-bottom:10px;
    background:rgba(255,255,255,.13);color:#fff;transition:.12s;
  }
  .home-btn.primary{background:var(--gold);color:#3a2e05;border-color:var(--gold)}
  .home-btn.ghost{background:transparent}
  .home-btn:active{transform:scale(.98)}
  .join-box{margin:2px 0 10px;display:flex;flex-direction:column;gap:8px}
  .join-input{
    width:100%;border:2px solid rgba(255,255,255,.4);background:rgba(255,255,255,.1);color:#fff;
    border-radius:12px;padding:14px;font-family:'Cairo';font-weight:800;font-size:24px;text-align:center;
    letter-spacing:8px;outline:none;text-transform:uppercase;
  }
  .join-input::placeholder{color:rgba(255,255,255,.5);font-size:14px;letter-spacing:normal;font-weight:500}
  .home-note{margin-top:12px;font-size:13px;color:#ffe08a;font-weight:700;min-height:18px}

  /* ===== Room bar ===== */
  .room-bar{
    display:none;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:6px 9px;color:#fff;
  }
  .rb-left,.rb-right{display:flex;align-items:center;gap:6px;min-width:0}
  .rb-code{font-family:'Cairo';font-weight:900;font-size:18px;letter-spacing:2px;color:var(--gold)}
  .rb-btn{
    background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);color:#fff;border-radius:8px;
    padding:5px 9px;font-family:'Tajawal';font-weight:700;font-size:12px;cursor:pointer;
  }
  .rb-btn:active{transform:scale(.96)}
  .rb-exit{background:rgba(214,58,58,.28);border-color:rgba(214,58,58,.5)}
  .rb-status{font-size:11px;font-weight:800;white-space:nowrap}
  .rb-status.ok{color:#8ff0c0}
  .rb-status.bad{color:#ff9b9b}
  .rb-count{font-size:12px;color:rgba(255,255,255,.85);font-weight:700;white-space:nowrap}

  /* ===== Guest / room view states ===== */
  body.inroom #newBtn{display:none}
  body.inroom #homeBtn{display:none}
  .spk{display:none}
  body.inroom:not(.guest) .spk{display:inline-block}
  body.guest .entry-panel{display:none}
  body.guest #undoBtn,body.guest #newBtn{display:none}
  body.guest .pn-edit{display:none}
  body.guest .pcard .pname{cursor:default;background:transparent;border-color:transparent;padding:2px 4px}
  body.guest .dealer-line{cursor:default}
  body.guest .dealer-line .dl-hint{display:none}
</style>
</head>
<body class="notranslate">

<div id="home" class="home">
  <div class="home-card">
    <div class="home-logo">♠️♥️</div>
    <h1 class="home-title">بنت السبيت</h1>

<script>
"use strict";

/* ============ ثوابت اللعبة ============ */
const THRESHOLD = 152;
const VALID_TOTALS = [36, 46, 49, 59];
const SUITS = ['♥', '♠'];              // فريق 1 / فريق 2
const KEY = 'bintelsbeit_state_v2';
const NAME_LIST = ['عبدالله','أبو أحمد','العسكر','القعود','أبو سالم','فهد','أبو غلا','رائد','يوسف','حسام','أبو فيصل','معتز','أبو نورة','أبو جود','أبو منيرة','الزوم'];

/* ============ التخزين (آمن، ما يوقف لو تعطّل) ============ */
function save(){
  if(typeof RM !== 'undefined' && RM){
    if(RM.role === 'host'){ mirrorLocal(); pushState(); }
    return;                       // الضيف لا يكتب
  }
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
}
function load(){ try{ const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : null; }catch(e){ return null; } }

/* ============ الحالة ============ */
function freshState(start){
  return {
    start: start,
    teams: [{name:'الفريق الأول'}, {name:'الفريق الثاني'}],
    players: [
      {name:'لاعب 1', team:0},
      {name:'لاعب 2', team:1},
      {name:'لاعب 3', team:0},
      {name:'لاعب 4', team:1}
    ],
    history: [],   // {type:'normal'|'kaboot'|'adjust', deltas:[a,b,c,d], label}
    initialDealer: 0,   // الموزّع قبل أي دورة (لاعب 1 افتراضياً)
    finished: false,
    result: null
  };
}

let state = load() || freshState(0);
if(state.initialDealer === undefined) state.initialDealer = 0;

/* ============ حسابات ============ */
function totals(){
  const t = [state.start, state.start, state.start, state.start];
  for(const r of state.history) for(let i=0;i<4;i++) t[i] += r.deltas[i];
  return t;
}

// مجموع أوراق الدورة = مجموع القيم الموجبة فقط (0 و -5 = صفر أوراق)
function cardSum(vals){
  return vals.reduce((s,v)=> s + (v>0 ? v : 0), 0);
}

// فحص النهاية بعد أي دورة
function evaluateEnd(){
  const t = totals();
  const cand = [0,1,2,3].filter(i => t[i] >= THRESHOLD);
  if(cand.length === 0) return {finished:false};
  const max = Math.max(...cand.map(i=>t[i]));
  const top = cand.filter(i => t[i] === max);
  const topTeams = [...new Set(top.map(i => state.players[i].team))];
  if(topTeams.length === 1){
    return {finished:true, losingTeam:topTeams[0], byPlayers:top, max};
  }
  return {finished:false, tie:true, max, topPlayers:top};
}

/* ============ الموزّع (الديلر) ============ */
// الموزّع دائماً صاحب أعلى نقاط. عند التعادل: يبقى مع آخر موزّع إن كان من المتعادلين،
// وإلا ينتقل لأقرب لاعب على يمينه مع عقارب الساعة (1←2←3←4←1).
function dealerFor(t, prev){
  const max = Math.max(...t);
  const tied = [0,1,2,3].filter(i => t[i] === max);
  if(tied.length === 1) return tied[0];
  for(let step=0; step<4; step++){
    const i = (prev + step) % 4;      // نبدأ من الموزّع السابق ثم مع عقارب الساعة
    if(tied.includes(i)) return i;
  }
  return tied[0];
}

// الموزّع الحالي: نعيد تشغيل الدورات من الموزّع الأول لاشتقاق السلسلة
function currentDealer(){
  let prev = state.initialDealer ?? 0;
  const t = [state.start, state.start, state.start, state.start];
  for(const r of state.history){
    for(let i=0;i<4;i++) t[i] += r.deltas[i];
    prev = dealerFor(t, prev);
  }
  return prev;
}

/* ============ إجراءات ============ */
function recordRound(deltas, type, label){
  state.history.push({type, deltas, label});
  _scrollLogBottom = true;
  const ev = evaluateEnd();
  if(ev.finished){
    state.finished = true;
    const winTeam = 1 - ev.losingTeam;
    const names = ev.byPlayers.map(i => state.players[i].name).join(' و ');
    state.result = {
      losing: ev.losingTeam,
      winning: winTeam,
      why: names + ' وصل ' + ev.max
    };
  } else if(ev.tie){
    const names = ev.topPlayers.map(i => state.players[i].name).join(' و ');
    toast('تعادل على القمة عند ' + ev.max + ' بين فريقين — اللعبة مستمرة، سجّلوا دورة ثانية', 'warn');
  }
  save();
  render();
  autoSpeak();
}

function undo(){
  if(viewer()) return;
  if(state.history.length === 0){ toast('ما فيه دورات للتراجع'); return; }
  state.history.pop();
  state.finished = false;
  state.result = null;
  save();
  render();
  toast('تم التراجع عن آخر دورة');
}

function newGame(){
  if(viewer()) return;
  document.getElementById('modeModal').classList.add('show');
}
function startGame(tight){
  if(viewer()) return;
  document.getElementById('modeModal').classList.remove('show');
  const oldNames = {teams:state.teams.map(t=>t.name), players:state.players.map(p=>p.name)};
  state = freshState(tight ? 52 : 0);
  // نحتفظ بالأسماء إذا كانت معدّلة
  state.teams.forEach((t,i)=> t.name = oldNames.teams[i]);
  state.players.forEach((p,i)=> p.name = oldNames.players[i]);
  save();
  render();
  clearInputs();
  toast(tight ? 'لعبة مشدودة جديدة — الكل يبدأ من 52' : 'لعبة عادية جديدة — الكل يبدأ من 0');
}

/* تعديل يدوي لنقاط لاعب (تصحيح) */
function editScore(i){
  if(viewer()) return;
  const t = totals();
  askInput('النقاط الجديدة لـ ' + state.players[i].name, t[i], (val)=>{
    const n = parseInt(val, 10);
    if(isNaN(n)){ toast('قيمة غير صحيحة'); return; }
    const deltas = [0,0,0,0];
    deltas[i] = n - t[i];
    recordRound(deltas, 'adjust', 'تصحيح: ' + state.players[i].name);
  });
}

/* تغيير اسم لاعب: قائمة أسماء جاهزة + خيار كتابة */
function renamePlayer(i){
  if(viewer()) return;
  askName(state.players[i].name, (name)=>{
    state.players[i].name = name;
    save(); render();
  });
}
function renameTeam(t){
  askInput('اسم الفريق', state.teams[t].name, (val)=>{
    const name = (val || '').trim();
    if(!name){ toast('الاسم لا يمكن أن يكون فارغاً'); return; }
    state.teams[t].name = name;
    save(); render();
  }, 'text');
}

let _nameCb = null;
function askName(current, cb){
  _nameCb = cb;
  const list = document.getElementById('nmList');
  const wrap = document.getElementById('nmCustomWrap');
  wrap.style.display = 'none';
  list.style.display = 'flex';
  list.innerHTML =
    NAME_LIST.map((n, idx) => '<button class="nm-item'+(n===current?' current':'')+'" data-idx="'+idx+'">'+esc(n)+'</button>').join('') +
    '<button class="nm-item other" data-other="1">لاعب آخر (كتابة)…</button>';
  list.querySelectorAll('[data-idx]').forEach(btn=>{
    btn.onclick = ()=>{ closeModal('nameModal'); const cb2=_nameCb; _nameCb=null; if(cb2) cb2(NAME_LIST[+btn.dataset.idx]); };
  });
  list.querySelector('[data-other]').onclick = ()=>{
    list.style.display = 'none';
    wrap.style.display = 'block';
    const inp = document.getElementById('nmCustom');
    inp.value = NAME_LIST.includes(current) ? '' : (current || '');
    setTimeout(()=>{ inp.focus(); inp.select(); }, 40);
  };
  document.getElementById('nameModal').classList.add('show');
  list.scrollTop = 0;   // ابدأ من فوق
}

/* ============ واجهة الإدخال ============ */
function readInputs(){
  const out = [];
  for(let i=0;i<4;i++){
    const el = document.getElementById('in'+i);
    const raw = el.value.trim();
    out.push(raw === '' ? null : parseInt(raw, 10));
  }
  return out;
}
function clearInputs(){
  for(let i=0;i<4;i++){
    const el = document.getElementById('in'+i);
    if(el){ el.value=''; el.classList.remove('neg'); }
  }
  document.querySelectorAll('.q5').forEach(b=>b.classList.remove('on'));
  updateSum();
}

function updateSum(){
  const vals = readInputs();
  const allEmpty = vals.every(v => v === null);
  const nums = vals.map(v => v === null ? 0 : v);
  // علّم الخانات السالبة
  for(let i=0;i<4;i++){
    const el = document.getElementById('in'+i);
    if(el) el.classList.toggle('neg', vals[i] !== null && vals[i] < 0);
  }
  const chip = document.getElementById('sumChip');
  const noteEl = document.getElementById('sumNote');
  // كم لاعب "ما أكل" (سالب) — للتوضيح فقط، غير محتسب في المجموع
  const negCount = vals.filter(v => v !== null && v < 0).length;
  noteEl.textContent = negCount > 0
    ? '‎-5‎ عقوبة، غير محسوبة في مجموع الأوراق'
    : '';
  if(allEmpty){ chip.className='chip neutral'; chip.textContent='—'; return; }
  const cs = cardSum(nums);
  if(VALID_TOTALS.includes(cs)){
    chip.className='chip ok'; chip.textContent = cs + ' ✓';
  } else {
    chip.className='chip bad'; chip.textContent = cs + ' · ' + nearestHint(cs);
  }
}

// أقرب إجمالي صحيح + كم ناقص/زائد (وعند تساوي المسافة يعرض الاحتمالين)
function nearestHint(s){
  const minD = Math.min(...VALID_TOTALS.map(v => Math.abs(v - s)));
  const atMin = VALID_TOTALS.filter(v => Math.abs(v - s) === minD).sort((a,b)=>a-b);
  return atMin.map(v => s > v ? ('زائد ' + (s - v) + ' عن ' + v)
                              : ('ناقص ' + (v - s) + ' لـ' + v)).join(' أو ');
}

function onRecord(){
  if(viewer()) return;
  if(state.finished){ toast('اللعبة انتهت — ابدأ لعبة جديدة'); return; }
  const vals = readInputs();
  if(vals.every(v => v === null)){ toast('أدخل نقاط الدورة أولاً'); return; }
  const nums = vals.map(v => v === null ? 0 : v);
  const cs = cardSum(nums);
  if(!VALID_TOTALS.includes(cs)){
    askConfirm(
      'مجموع أوراق الدورة = ' + cs + ' (' + nearestHint(cs) + '). ما يطابق الإجماليات المعروفة (36 / 46 / 49 / 59)، يمكن فيه خطأ بالعدّ. تبي تسجّلها على أي حال؟',
      'سجّلها على أي حال',
      ()=>{ recordRound(nums, 'normal', ''); clearInputs(); }
    );
    return;
  }
  recordRound(nums, 'normal', '');
  clearInputs();
}

/* كبوت (نافذة منبثقة) */
function showKaboot(){
  if(viewer()) return;
  if(state.finished){ toast('اللعبة انتهت — ابدأ لعبة جديدة'); return; }
  const box = document.getElementById('kabootPick');
  box.innerHTML =
    '<div class="kb t0" data-k="0">'+esc(teamNames(0))+'<small>كبتوا: لهم ‎-10‎ لكل لاعب · للطرف الآخر ‎+26‎</small></div>' +
    '<div class="kb t1" data-k="1">'+esc(teamNames(1))+'<small>كبتوا: لهم ‎-10‎ لكل لاعب · للطرف الآخر ‎+26‎</small></div>';
  box.querySelectorAll('.kb').forEach(el=>{
    el.onclick = ()=> applyKaboot(parseInt(el.dataset.k,10));
  });
  document.getElementById('kabootModal').classList.add('show');
}
function hideKaboot(){ document.getElementById('kabootModal').classList.remove('show'); }
function applyKaboot(k){
  const deltas = state.players.map(p => p.team === k ? -10 : 26);
  recordRound(deltas, 'kaboot', 'كبوت — ' + state.teams[k].name);
  hideKaboot();
  clearInputs();
  toast('تم تسجيل الكبوت لصالح ' + teamNames(k));
}

/* ============ الرسم ============ */
function barColor(pct){
  if(pct >= 92) return 'var(--danger)';
  if(pct >= 75) return 'var(--amber)';
  return 'var(--ok)';
}

function render(){
  // الوضع
  document.getElementById('modeLabel').textContent =
    state.start === 52 ? 'الوضع المشدود — يبدأ من 52' : 'الوضع العادي — يبدأ من 0';

  const t = totals();
  const dealer = currentDealer();
  const noRounds = state.history.length === 0;

  // اللوحة: صف اللاعبين بالترتيب 1..4 (يمين ← يسار) + سطر الموزّع
  const board = document.getElementById('board');
  board.innerHTML =
    '<div class="players-row">' + [0,1,2,3].map(i => playerCard(i, t[i], dealer)).join('') + '</div>' +
    '<div class="dealer-line" id="dealerLine">🃏 الموزّع: <b>' + esc(state.players[dealer].name) + '</b>' +
      (noRounds ? ' <span class="dl-hint">(اضغط لتغيير الموزّع الأول)</span>' : '') +
    '</div>';

  // النتيجة
  const res = document.getElementById('result');
  if(state.result){
    res.classList.add('show');
    document.getElementById('loseText').textContent = 'خسر ' + teamNames(state.result.losing);
    document.getElementById('winText').textContent = '🏆 فاز ' + teamNames(state.result.winning);
    document.getElementById('whyText').textContent = state.result.why;
  } else {
    res.classList.remove('show');
  }
  // زر إنهاء اللعبة (المضيف في غرفة) / انتظار (الضيف)
  const okBtn = document.getElementById('resultOk');
  const waitEl = document.getElementById('resultWait');
  if(okBtn && waitEl){
    const inRoom = (typeof RM !== 'undefined' && RM);
    if(state.result && inRoom && RM.role === 'host'){ okBtn.style.display='block'; waitEl.style.display='none'; }
    else if(state.result && inRoom && RM.role === 'guest'){ okBtn.style.display='none'; waitEl.style.display='block'; }
    else { okBtn.style.display='none'; waitEl.style.display='none'; }
  }

  // السجل
  renderLog();
  updateSum();
  syncEntryLabels();
  attachEditable();
}

function teamNames(tm){
  return [0,1,2,3].filter(i => state.players[i].team === tm)
                  .map(i => state.players[i].name).join(' و ');
}

function playerCard(i, score, dealer){
  const tm = state.players[i].team;
  const pct = Math.max(0, Math.min(100, (score / THRESHOLD) * 100));
  const dead = state.result && evaluateIsDead(i);
  const isDealer = i === dealer;
  const remaining = THRESHOLD - score;
  const distTxt = score >= THRESHOLD ? 'تجاوز 152' : 'باقي ' + remaining;
  return '<div class="pcard team'+tm+(dead?' dead':'')+(isDealer?' dealer':'')+'">' +
    (isDealer ? '<span class="deal-badge">🃏</span>' : '') +
    '<div class="pc-top">' +
      '<span class="pname" data-rename="'+i+'"><span class="pn-text">'+esc(state.players[i].name)+'</span><i class="pn-edit">✎</i></span>' +
    '</div>' +
    '<div class="score" data-edit="'+i+'">'+score+'</div>' +
    '<div class="bar"><i style="width:'+pct+'%;background:'+barColor(pct)+'"></i></div>' +
    '<div class="dist">'+distTxt+'</div>' +
  '</div>';
}

// أي اللاعبين تسبّب بالخسارة (للتظليل)
function evaluateIsDead(i){
  const t = totals();
  if(!state.result) return false;
  if(state.players[i].team !== state.result.losing) return false;
  const teamScores = [0,1,2,3].filter(j=>state.players[j].team===state.result.losing).map(j=>t[j]);
  return t[i] >= THRESHOLD && t[i] === Math.max(...teamScores);

let _scrollLogBottom = false;
function renderLog(){
  const grid = document.getElementById('logGrid');
  const n = state.history.length;
  document.getElementById('logCount').textContent = n ? ('(' + n + ' دورة)') : '';

  // صف العناوين: أسماء اللاعبين بالأعمدة (محاذية للمربعات فوق)
  let html = '<div class="log-row log-hrow">' +
    '<span class="lc-num">#</span>' +
    [0,1,2,3].map(i => '<span class="lc t'+state.players[i].team+'">'+esc(state.players[i].name)+'</span>').join('') +
  '</div>';

  if(n === 0){
    html += '<div class="log-empty">ما فيه دورات بعد — سجّل أول دورة وتظهر هنا</div>';
  } else {
    const run = [state.start, state.start, state.start, state.start];   // المجموع التراكمي
    for(let k = 0; k < n; k++){
      const r = state.history[k];
      const before = run.slice();                       // المجموع قبل هذه الدورة
      for(let i=0;i<4;i++) run[i] += r.deltas[i];
      const cls = r.type === 'kaboot' ? ' kaboot' : (r.type === 'adjust' ? ' adjust' : '');
      const num = r.type === 'kaboot' ? 'ك' : (r.type === 'adjust' ? 'ت' : (k+1));
      html += '<div class="log-row'+cls+'">' +
        '<span class="lc-num">'+num+'</span>' +
        r.deltas.map((d,i) => '<span class="lc ht'+state.players[i].team+'"><b>'+fmt(d)+'</b><em>'+(k===0?'':before[i])+'</em></span>').join('') +
      '</div>';
    }
  }
  grid.innerHTML = html;
  if(_scrollLogBottom){ grid.scrollTop = grid.scrollHeight; _scrollLogBottom = false; }
}

function subscribe(){
  const c = sbClient(); if(!c || !RM) return;
  const ch = c.channel('room_'+RM.code, { config:{ presence:{ key: deviceId() } } })
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'sbeit_rooms', filter:'code=eq.'+RM.code },
        (p)=> onRemote(p.new))
    .on('presence', { event:'sync' }, ()=> updateCount())
    .subscribe(async (status)=>{
      if(status === 'SUBSCRIBED'){ try{ await ch.track({ id: deviceId(), role: RM.role }); }catch(e){} }
    });
  RM.channel = ch;
}
function onRemote(row){
  if(!RM || !row) return;
  const ns = row.state;
  if(ns && ns.__ended){ roomEnded('ended'); return; }
  RM.hostLastSeen = row.host_last_seen || RM.hostLastSeen;
  if(RM.role === 'guest'){

/* ============ صورة النتيجة (للمشاركة) ============ */
function buildResultImage(){
  const W = 1080, H = 1080;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const x = c.getContext('2d');
  // خلفية
  const g = x.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#12724f'); g.addColorStop(1,'#083b2c');
  x.fillStyle = g; x.fillRect(0,0,W,H);
  // إطار ذهبي
  x.strokeStyle = 'rgba(201,162,39,.55)'; x.lineWidth = 6;
  x.strokeRect(30,30,W-60,H-60);
  x.textAlign = 'center';
  x.direction = 'rtl';
  // العنوان
  x.fillStyle = '#c9a227';
  x.font = "900 78px Cairo, sans-serif";
  x.fillText('بنت السبيت', W/2, 150);
  x.fillStyle = 'rgba(255,255,255,.85)';
  x.font = "700 34px Tajawal, sans-serif";
  x.fillText('نتيجة اللعبة 🎴', W/2, 205);

  const t = totals();
  const win = state.result ? state.result.winning : 0;
  const lose = state.result ? state.result.losing : 1;

  // شعار الفوز/الخسارة
  x.fillStyle = '#ffdf7e';
  x.font = "900 46px Cairo, sans-serif";
  x.fillText('🏆 فاز ' + teamNames(win), W/2, 300);
  x.fillStyle = 'rgba(255,255,255,.7)';
  x.font = "700 34px Tajawal, sans-serif";
  x.fillText('خسر ' + teamNames(lose), W/2, 355);

  // بطاقات اللاعبين
  const rowY0 = 460, rowH = 120, cardW = 900, cardX = (W-cardW)/2;
  for(let i=0;i<4;i++){
    const y = rowY0 + i*rowH;
    const tm = state.players[i].team;
    const col = tm === 0 ? '#1565c0' : '#e8730c';
    // بطاقة
    x.fillStyle = 'rgba(255,255,255,.96)';
    roundRect(x, cardX, y, cardW, rowH-18, 18); x.fill();
    // شريط اللون
    x.fillStyle = col; roundRect(x, cardX, y, 14, rowH-18, 7); x.fill();
    // الاسم (يمين)
    x.fillStyle = '#1b1b1b'; x.textAlign = 'right';
    x.font = "800 44px Tajawal, sans-serif";
    x.fillText(state.players[i].name, cardX + cardW - 40, y + 66);
    // المجموع (يسار)
    x.fillStyle = col; x.textAlign = 'left';
    x.font = "900 56px Cairo, sans-serif";
    x.fillText(String(t[i]), cardX + 45, y + 70);
  }
  // التاريخ
  x.textAlign = 'center';
  x.fillStyle = 'rgba(255,255,255,.6)';
  x.font = "500 26px Tajawal, sans-serif";
  const d = new Date();
  const ds = d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
  x.fillText(ds + ' · ralghamdi.github.io/sbeit', W/2, H-55);
  return c;
}
function roundRect(x, X, Y, w, h, r){
  x.beginPath();
  x.moveTo(X+r,Y); x.arcTo(X+w,Y,X+w,Y+h,r); x.arcTo(X+w,Y+h,X,Y+h,r);
  x.arcTo(X,Y+h,X,Y,r); x.arcTo(X,Y,X+w,Y,r); x.closePath();
}
function shareResultImage(){

    if(!blob){ toast('تعذّر إنشاء الصورة'); return; }
    const file = new File([blob], 'bint-elsbeit.png', { type:'image/png' });

      }
    }catch(e){ if(e && e.name === 'AbortError') return; }
    // بديل: تنزيل الصورة

    }catch(e){ toast('تعذّر حفظ الصورة'); }
  }, 'image/png');
}
function copyText(t){

  catch(e){ const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(_){}; ta.remove(); }
}

function arWords(n){
  n = parseInt(n, 10);
  if(isNaN(n)) return '';
  if(n < 0) return 'ناقص ' + arWords(-n);
  if(n === 0) return 'صفر';
  const ones = ['','واحد','اثنين','ثلاثة','أربعة','خمسة','ستة','سبعة','ثمانية','تسعة','عشرة','أحد عشر','اثنا عشر','ثلاثة عشر','أربعة عشر','خمسة عشر','ستة عشر','سبعة عشر','ثمانية عشر','تسعة عشر'];
  const tens = ['','','عشرين','ثلاثين','أربعين','خمسين','ستين','سبعين','ثمانين','تسعين'];
  const hundreds = ['','مئة','مئتان','ثلاثمئة','أربعمئة','خمسمئة','ستمئة','سبعمئة','ثمانمئة','تسعمئة'];
  const parts = [];
  const h = Math.floor(n/100), rem = n%100;
  if(h > 0) parts.push(hundreds[h]);
  if(rem > 0){
    if(rem < 20) parts.push(ones[rem]);
    else { const u = rem%10, t = Math.floor(rem/10); parts.push(u > 0 ? (ones[u] + ' و' + tens[t]) : tens[t]); }
  }
  return parts.join(' و');
}

// جملة واحدة لكل الدورة (طلب API واحد) — أرقام بصياغة عامية
function totalsSentence(){
  const t = totals();
  let s = state.players.map((p,i) => p.name + ' ' + arWords(t[i])).join('، ');
  return s.replace(/-?\d+/g, m => arWords(m));
}

async function speakTotals(){
  if(!canSpeak() || !navigator.onLine) return;
  const text = totalsSentence();
  // نفس النص المنطوق آخر مرة؟ أعِد تشغيل نفس المقطع (مطابق تماماً + يوفّر الحصة)
  if(text === _lastText && _lastUrl){ playUrl(_lastUrl); return; }
  try{
    const res = await fetch(SPEAK_URL, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if(!res.ok){ return; }                 // فشل الصوت — نتجاهل بصمت (ما يعطّل اللعب)
    const blob = await res.blob();
    if(_lastUrl){ try{ URL.revokeObjectURL(_lastUrl); }catch(e){} }
    _lastUrl = URL.createObjectURL(blob);
    _lastText = text;
    playUrl(_lastUrl);
  }catch(e){}
}
function autoSpeak(){ speakTotals(); }
